<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Physics CBT — Exam Practice</title>

  <!-- Font (so your UI doesn't look like 2008) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="exam-shell">

    <!-- HEADER -->
    <header class="exam-header">
      <div>
        <h1>Physics CBT</h1>
        <p>
          20 Questions • Work, Energy, Power, Friction, Surface Tension, Viscosity
        </p>
      </div>

      <div class="timer-panel">
        <span>Time left</span>
        <strong id="timer">20:00</strong>
      </div>
    </header>

    <!-- MAIN APP (JS CONTROLS EVERYTHING HERE) -->
    <main id="app" class="exam-main"></main>

    <!-- FOOTER -->
    <footer class="exam-footer">
      Built for fast practice and quick review.
    </footer>

  </div>

  <!-- JS loads LAST so DOM exists -->
  <script src="app.js"></script>
</body>
</html>
